spring:
  application:
    name: festival-qr-order
  docker:
    compose:
      file: compose.dev.yml
      lifecycle-management: start_only
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/festival_order?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:festival}
    password: ${DB_PASSWORD:festival}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
    show-sql: ${JPA_SHOW_SQL:false}
  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  frontend-base-url: ${APP_BASE_URL:${FRONTEND_BASE_URL:http://localhost:8080}}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080}
  qr-output-dir: ${QR_OUTPUT_DIR:./uploads/qr}
  menu-image-output-dir: ${MENU_IMAGE_OUTPUT_DIR:./uploads/menu-images}
  admin-cookie-secure: ${ADMIN_COOKIE_SECURE:false}
  jwt:
    secret: ${JWT_SECRET:replace-this-with-at-least-32-byte-secret-key}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  toss:
    secret-key: ${TOSS_SECRET_KEY:test_sk_replace_me}
    client-key: ${TOSS_CLIENT_KEY:test_ck_replace_me}
    confirm-url: ${TOSS_CONFIRM_URL:https://api.tosspayments.com/v1/payments/confirm}
