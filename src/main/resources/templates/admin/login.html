<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('관리자 로그인')}"></head>
<body>
<main class="mx-auto flex min-h-screen max-w-md items-center px-4">
    <section class="festival-card w-full rounded-3xl p-6">
        <p class="text-sm font-bold text-amber-300">Festival Admin</p>
        <h1 class="mt-2 text-3xl font-black">관리자 로그인</h1>
        <form id="loginForm" class="mt-6 grid gap-3">
            <input id="username" class="h-14 rounded-2xl border border-white/10 bg-zinc-900 px-4 text-white" placeholder="아이디" autocomplete="username">
            <input id="password" type="password" class="h-14 rounded-2xl border border-white/10 bg-zinc-900 px-4 text-white" placeholder="비밀번호" autocomplete="current-password">
            <button class="big-button bg-rose-500 text-white">로그인</button>
        </form>
    </section>
</main>
<div th:replace="~{fragments/toast :: toast}"></div>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/admin-login.js}"></script>
</body>
</html>
