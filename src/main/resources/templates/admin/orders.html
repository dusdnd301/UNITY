<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('관리자 주문')}"></head>
<body>
<main class="mx-auto min-h-screen max-w-5xl px-4 py-5">
    <header class="mb-5 flex flex-wrap items-end justify-between gap-3">
        <div>
            <p class="text-sm font-bold text-amber-300">실시간 주문 대시보드</p>
            <h1 class="mt-2 text-3xl font-black">주방 주문 현황</h1>
        </div>
        <button id="logoutButton" class="rounded-xl bg-zinc-800 px-4 py-3 font-bold">로그아웃</button>
    </header>
    <section class="grid gap-5 lg:grid-cols-[1fr_340px]">
        <div id="orders" class="grid content-start gap-4">
            <section class="festival-card rounded-2xl p-3">
                <div class="mb-3 flex items-center justify-between">
                    <h2 class="text-lg font-black">대기</h2>
                    <span id="pendingCount" class="rounded-full bg-zinc-800 px-3 py-1 text-sm font-black">0</span>
                </div>
                <div id="pendingOrders" class="grid gap-3 md:grid-cols-2"></div>
            </section>
            <section class="festival-card rounded-2xl p-3">
                <div class="mb-3 flex items-center justify-between">
                    <h2 class="text-lg font-black text-amber-300">접수</h2>
                    <span id="acceptedCount" class="rounded-full bg-amber-400 px-3 py-1 text-sm font-black text-zinc-950">0</span>
                </div>
                <div id="acceptedOrders" class="grid gap-3 md:grid-cols-2"></div>
            </section>
            <section class="festival-card rounded-2xl p-3">
                <div class="mb-3 flex items-center justify-between">
                    <h2 class="text-lg font-black text-emerald-300">완료</h2>
                    <span id="doneCount" class="rounded-full bg-emerald-400 px-3 py-1 text-sm font-black text-zinc-950">0</span>
                </div>
                <div id="doneOrders" class="grid gap-3 md:grid-cols-2"></div>
            </section>
        </div>
        <aside class="grid content-start gap-4">
            <section class="festival-card rounded-2xl p-4">
                <h2 class="text-xl font-black">메뉴 추가</h2>
                <form id="menuForm" class="mt-3 grid gap-2">
                    <input id="menuName" required class="h-12 rounded-xl bg-zinc-900 px-3" placeholder="메뉴명">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="menuCategory" required class="h-12 rounded-xl bg-zinc-900 px-3" placeholder="분류">
                        <input id="menuPrice" required type="number" min="0" step="100" class="h-12 rounded-xl bg-zinc-900 px-3" placeholder="가격">
                    </div>
                    <input id="menuImageFile" type="file" accept="image/*" class="rounded-xl bg-zinc-900 px-3 py-3 text-sm file:mr-3 file:rounded-lg file:border-0 file:bg-zinc-700 file:px-3 file:py-2 file:font-bold file:text-white">
                    <textarea id="menuDescription" rows="3" class="resize-none rounded-xl bg-zinc-900 px-3 py-3" placeholder="설명 선택"></textarea>
                    <button class="h-12 rounded-xl bg-amber-400 font-black text-zinc-950">메뉴 등록</button>
                </form>
            </section>
            <section class="festival-card rounded-2xl p-4">
                <h2 class="text-xl font-black">메뉴 관리</h2>
                <div id="menus" class="mt-3 grid gap-2"></div>
            </section>
            <section class="festival-card rounded-2xl p-4">
                <h2 class="text-xl font-black">테이블 QR</h2>
                <form id="tableForm" class="mt-3 flex gap-2">
                    <input id="tableNumber" type="number" min="1" class="h-12 min-w-0 flex-1 rounded-xl bg-zinc-900 px-3" placeholder="번호">
                    <button class="h-12 rounded-xl bg-amber-400 px-4 font-black text-zinc-950">생성</button>
                </form>
                <button id="refreshQrButton" class="mt-2 h-12 w-full rounded-xl bg-zinc-800 font-black">현재 주소로 QR 재생성</button>
                <div id="tables" class="mt-3 grid gap-2"></div>
            </section>
        </aside>
    </section>
</main>
<div th:replace="~{fragments/toast :: toast}"></div>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/admin-orders.js}"></script>
</body>
</html>
