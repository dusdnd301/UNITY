services:
  mysql:
    image: mysql:8.4
    container_name: festival-dev-mysql
    environment:
      MYSQL_DATABASE: festival_order
      MYSQL_USER: festival
      MYSQL_PASSWORD: festival
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - festival-dev-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]

volumes:
  festival-dev-mysql-data:
